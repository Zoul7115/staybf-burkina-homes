# supabase/config.toml — StayBF Burkina Homes
# Supabase CLI configuration file.
# Reference: https://supabase.com/docs/reference/cli/config

# ─────────────────────────────────────────────────────────────
# Project
# ─────────────────────────────────────────────────────────────
# A unique string used to distinguish different Supabase projects on the same
# host. Defaults to the working directory name when running `supabase init`.
project_id = "staybf-burkina-homes"

# ─────────────────────────────────────────────────────────────
# API
# ─────────────────────────────────────────────────────────────
[api]
enabled = true
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API. Tables, views, and stored procedures in this
# schema will get API endpoints. public and storage are always included.
schemas = ["public", "storage"]
# Extra schemas to add to the search_path of every request.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returns from a view, table, or stored procedure.
# Limits payload size for accidental or malicious requests.
max_rows = 1000

# ─────────────────────────────────────────────────────────────
# Database
# ─────────────────────────────────────────────────────────────
[db]
# Port to use for the local database URL.
port = 54322
# Port used by db diff command to initialise the shadow database.
shadow_port = 54320
# The database major version to use. This has to be the same as your remote
# database's. Run `SHOW server_version;` on the remote database to check.
major_version = 15

[db.pooler]
enabled = false
# Port to use for the local connection pooler.
port = 54329
# Specifies when a server connection can be reused by other clients.
# Configure one of the supported pooler modes: `transaction`, `session`.
pool_mode = "transaction"
# How many server connections to allow per user/database pair.
default_pool_size = 20
# Maximum number of client connections allowed.
max_client_conn = 100

# ─────────────────────────────────────────────────────────────
# Realtime
# ─────────────────────────────────────────────────────────────
[realtime]
enabled = true
# Bind realtime via either IPv4 or IPv6. (default: IPv6)
ip_version = "IPv4"
# The minimum number of bytes from the database replication slot before
# realtime starts processing them. (default: 0)
max_header_length = 4096

# ─────────────────────────────────────────────────────────────
# Studio
# ─────────────────────────────────────────────────────────────
[studio]
enabled = true
# Port to use for Supabase Studio.
port = 54323
# External URL of the API server that frontend connects to.
api_url = "http://127.0.0.1"
# OpenAI API Key to use for Supabase AI in the Studio.
openai_api_key = "env(OPENAI_API_KEY)"

# ─────────────────────────────────────────────────────────────
# Inbucket — local email testing
# ─────────────────────────────────────────────────────────────
[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

# ─────────────────────────────────────────────────────────────
# Storage
# ─────────────────────────────────────────────────────────────
[storage]
enabled = true
# The maximum file size allowed (e.g. "5MB", "500KB").
file_size_limit = "20MB"

# ─────────────────────────────────────────────────────────────
# Auth
# ─────────────────────────────────────────────────────────────
[auth]
enabled = true
# The base URL of your website. Used as an allow-list for redirects.
site_url = "http://localhost:5173"
# A list of *exact* URLs that auth providers are permitted to redirect to post
# authentication. Wildcard redirect URLs are not permitted.
additional_redirect_urls = [
  "https://staybf.com",
  "https://staybf.com/auth/callback",
  "http://localhost:5173/auth/callback",
  "http://localhost:8080/auth/callback"
]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour).
jwt_expiry = 3600
# If disabled, the refresh token will never expire.
enable_refresh_token_rotation = true
# Allows refresh tokens to be reused after expiry, up to the specified
# interval in seconds. Requires enable_refresh_token_rotation = true.
refresh_token_reuse_interval = 10
# Allow/disallow new user signups via any method.
enable_signup = true
# Allow/disallow anonymous sign-ins.
enable_anonymous_sign_ins = false
# Allow/disallow testing manual linking of accounts.
enable_manual_linking = false
# Password requirements
minimum_password_length = 8
password_requirements = ""

[auth.email]
# Allow/disallow new user signups via email to your project.
enable_signup = true
# If enabled, a user will be required to confirm any email change on both the
# old, and new email addresses. If disabled, only the new email is required to
# confirm.
double_confirm_changes = true
# If enabled, users need to confirm their email address before signing in.
enable_confirmations = true
# If enabled, users will need to reauthenticate or have logged in recently to
# change their password.
secure_password_change = false
# Controls the minimum amount of time that must pass before sending another
# signup confirmation or password reset email.
max_frequency = "1s"
# Number of characters used in the email OTP.
otp_length = 6
# Number of seconds before the email OTP expires (defaults to 1 hour).
otp_expiry = 3600

# Uncomment to customize email template:
# [auth.email.template.invite]
# subject = "You have been invited"
# content_path = "./supabase/templates/invite.html"

[auth.sms]
# Allow/disallow new user signups via SMS to your project.
enable_signup = false
enable_confirmations = false
template = "Your {{ .AppName }} code is {{ .Code }}"
max_frequency = "5s"

# Use pre-defined map of phone number to OTP for testing (local only):
# [auth.sms.test_otp]
# 4152127777 = "123456"

# ─────────────────────────────────────────────────────────────
# Edge Functions
# ─────────────────────────────────────────────────────────────
# Each edge function must be declared here for local development.
# Production deployment uses `supabase functions deploy`.

[functions.approve-booking]
verify_jwt = true

[functions.approve-property]
verify_jwt = true

[functions.approve-withdrawal]
verify_jwt = true

[functions.calculate-booking-price]
verify_jwt = false

[functions.cancel-booking]
verify_jwt = true

[functions.complete-withdrawal]
verify_jwt = true

[functions.create-booking]
verify_jwt = true

[functions.create-payment-intent]
verify_jwt = true

[functions.create-property]
verify_jwt = true

[functions.create-review]
verify_jwt = true

[functions.create-support-ticket]
verify_jwt = true

[functions.delete-image]
verify_jwt = true

[functions.delete-room]
verify_jwt = true

[functions.dispatch-withdrawal]
verify_jwt = true

[functions.export-csv]
verify_jwt = true

[functions.generate-pdf]
verify_jwt = true

[functions.payment-init]
verify_jwt = true

[functions.payment-status]
verify_jwt = true

[functions.payment-webhook]
# Webhook from GaniPay — no JWT, validated via HMAC-SHA256
verify_jwt = false

[functions.payout-dispatch]
verify_jwt = true

[functions.payout-status]
verify_jwt = true

[functions.process-payment-webhook]
# Internal webhook processor — validated via PAYMENT_WEBHOOK_SECRET
verify_jwt = false

[functions.process-withdrawal]
verify_jwt = true

[functions.refund-payment]
verify_jwt = true

[functions.reject-booking]
verify_jwt = true

[functions.reject-property]
verify_jwt = true

[functions.reject-withdrawal]
verify_jwt = true

[functions.retry-payment]
verify_jwt = true

[functions.retry-webhooks]
# Internal cron-triggered function — validated via service role key
verify_jwt = false

[functions.send-email]
verify_jwt = true

[functions.send-notification]
verify_jwt = true

[functions.send-sms]
verify_jwt = true

[functions.send-whatsapp]
verify_jwt = true

[functions.simulate-payment]
verify_jwt = true

[functions.sync-ical]
verify_jwt = false

[functions.update-property]
verify_jwt = true

[functions.upload-avatar]
verify_jwt = true

[functions.upload-property-image]
verify_jwt = true

[functions.upload-room-image]
verify_jwt = true

[functions.write-ledger-entry]
# Internal function — validated via service role key Bearer check
verify_jwt = false

# ─────────────────────────────────────────────────────────────
# Analytics
# ─────────────────────────────────────────────────────────────
[analytics]
enabled = false
port = 54327
# Configure one of the supported backends: `postgres`, `bigquery`
backend = "postgres"
