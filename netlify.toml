# ============================================================
# Netlify configuration — StayBF Burkina Homes
# Build: TanStack Start (SSR) via nitro netlify preset
# ============================================================

# ── Build ────────────────────────────────────────────────────
[build]
  command   = "npm run build:netlify"
  publish   = "dist/client"
  functions = "dist/server"

[build.environment]
  NODE_VERSION   = "22"

# ── Dev server (netlify dev) ──────────────────────────────────
[dev]
  command   = "npm run dev"
  port      = 8080
  targetPort = 5173

# ── Headers ──────────────────────────────────────────────────
#
# /assets/*  → hashed filenames → immutable cache (1 year)
# /          → no-cache for HTML (SSR; content may change)
# *          → security headers on every response
#
# CSP notes:
#   - script-src 'self' 'unsafe-inline': TanStack Start inlines
#     the hydration script; until nonces are wired through the
#     SSR renderer, unsafe-inline is required.
#   - connect-src covers Supabase REST + realtime websocket.
#     Replace *.supabase.co with your project URL for tighter scope.
#   - style-src 'unsafe-inline': Tailwind CSS-in-JS (v4) inlines
#     critical styles at runtime.
#   - font-src: Google Fonts (preconnect in __root.tsx).
# ─────────────────────────────────────────────────────────────

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    # Strict Transport Security (2 years, include subdomains)
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Clickjacking protection
    X-Frame-Options = "DENY"

    # MIME-type sniffing protection
    X-Content-Type-Options = "nosniff"

    # Referrer policy — send origin only to same-site; no path leakage cross-site
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Permissions Policy — disable features not used by this app
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()"

    # Content-Security-Policy
    Content-Security-Policy = """
default-src 'self';
script-src 'self' 'unsafe-inline';
style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
font-src 'self' https://fonts.gstatic.com data:;
img-src 'self' data: blob: https://*.supabase.co https://supabase.co;
connect-src 'self' https://*.supabase.co wss://*.supabase.co https://supabase.co;
frame-ancestors 'none';
base-uri 'self';
form-action 'self';
"""

    # Cross-Origin policies
    Cross-Origin-Opener-Policy   = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Resource-Policy = "same-site"

# ── Redirects ────────────────────────────────────────────────
#
# The nitro server.mjs already declares `path: "/*"` as a
# Netlify Function v2 handler (preferStatic: true), so all
# requests not matching a static file are routed to SSR.
# The rules below handle edge cases explicitly.
#
# 1. Trailing-slash normalisation (no redirect loop)
# 2. Force HTTPS (Netlify does this automatically in prod, but
#    explicit rule makes it visible).
# ─────────────────────────────────────────────────────────────

# Force HTTPS
[[redirects]]
  from   = "http://staybf.com/*"
  to     = "https://staybf.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.staybf.com/*"
  to     = "https://staybf.com/:splat"
  status = 301
  force  = true

# www → apex
[[redirects]]
  from   = "https://www.staybf.com/*"
  to     = "https://staybf.com/:splat"
  status = 301
  force  = true
